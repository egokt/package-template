# How to use this workflow:
# 1. Copy this file to your repo's .github/workflows/ directory.
#    DO NOT symlink. Github Actions does not support symlinks.
# 2. Update the name at the top of the file.
# 3. Update the PACKAGE_TAG_PREFIX and PACKAGE_PATH environment variables below.
#    * The PACKAGE_TAG_PREFIX should match the prefix used in your package's version tags.
#    * The PACKAGE_PATH should point to the directory where your package.json file is located,
#      relative to your repo's root.
# 4. If your package is published to GitHub Packages or it uses private dependencies
#    from GitHub Packages, uncomment the PACKAGE_REGISTRY and PACKAGE_SCOPE environment
#    variables below, and the corresponding lines in the setup-node step.
# 5. If your package uses private dependencies from GitHub Packages, uncomment the
#    "Configure npm authentication" step below.

name: Template Package Publish ** CHANGE THIS WITH YOUR PACKAGE NAME **

# NOTE: env context is only available in the jobs context below.
env:
  NODE_VERSION: '22.14.0'
  PACKAGE_PATH: '.'

  # When you update the PACKAGE_TAG_PREFIX, you must also update
  # the on.push.tags and concurrency.group values below.
  PACKAGE_TAG_PREFIX: 'template'

  # Uncomment the following two lines
  # if your package is published to GitHub Packages
  # or it uses private dependencies from GitHub Packages
  # PACKAGE_REGISTRY: "https://npm.pkg.github.com"
  # PACKAGE_SCOPE: "<< Package scope, e.g. @egokt >>"

on:
  push:
    tags:
      - 'template/v*'

concurrency:
  group: 'packages-template-publish-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            ${{ env.PACKAGE_PATH }}
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.PACKAGE_PATH }}/package-lock.json
          # Uncomment the following two lines
          # if your package is published to GitHub Packages
          # or it uses private dependencies from GitHub Packages
          # registry-url: ${{ env.PACKAGE_REGISTRY }}
          # scope: ${{ env.PACKAGE_SCOPE }}

      # Uncomment the following step and set scope and repository entries
      # if your package uses private dependencies from GitHub Packages.
      # The example below sets up github as repository and @egokt as scope.
      # - name: Configure npm authentication
      #   run: |
      #     echo "@egokt:registry=https://npm.pkg.github.com" >> ~/.npmrc
      #     echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
      #     echo "always-auth=true" >> ~/.npmrc
      #   working-directory: ${{ env.PACKAGE_PATH }}
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PACKAGE_PATH }}
        # Uncomment the following two lines
        # if your package uses private dependencies from GitHub Packages
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: npm run ci:check
        working-directory: ${{ env.PACKAGE_PATH }}
      - name: Verify version matches tag
        working-directory: ${{ env.PACKAGE_PATH }}
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION=${GITHUB_REF#refs/tags/${{ env.PACKAGE_TAG_PREFIX }}/v}
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "package.json version ($PKG_VERSION) != tag version ($TAG_VERSION)" >&2
              exit 1
            fi
      - name: Skip if version already published
        working-directory: ${{ env.PACKAGE_PATH }}
        run: |
          PKG_NAME=$(jq -r '.name' package.json)
          PKG_VERSION=$(jq -r '.version' package.json)
          if npm view "$PKG_NAME@$PKG_VERSION" version --registry=${{ env.PACKAGE_REGISTRY }} > /dev/null 2>&1; then
            echo "Version $PKG_NAME@$PKG_VERSION already exists. Skipping publish."
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          fi
      - name: Publish
        run: |
          if [ "$SKIP_PUBLISH" = "true" ]; then
            echo "Publish step skipped."; exit 0; fi
          npm run publish
        working-directory: ${{ env.PACKAGE_PATH }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
